# Predictor parameters
trajectory_predictor:
  ros__parameters:
    # Model configuration
    model_dir: ""               # Path to directory containing .h5 and .pkl files
                                 # TODO: Set this to actual path, e.g. /home/duy/Experiment/Trained model
    default_model: "gru"        # Default model: "rnn", "gru", or "lstm"
    
    # Model file names (must match files in model_dir)
    model_files:
      rnn: "rnn_velocity_3_layers.h5"
      gru: "gru_velocity_3_layers.h5"
      lstm: "lstm_velocity_3_layers.h5"
    
    # Scaler file names
    scaler_x_file: "scaler_x.pkl"
    scaler_y_file: "scaler_y.pkl"
    
    # Prediction parameters (must match training config)
    window_size: 20             # T = input sequence length
    num_features: 3             # x, y, z
    
    # Behavior
    auto_start: false           # Start predicting immediately on launch
    clear_on_tracking_lost: 1.0 # Clear buffer if no data for N seconds
